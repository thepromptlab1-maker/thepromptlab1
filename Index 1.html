<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Prompt Lab 1 — Marketing Agency AI Prompt Pack</title>
<style>
  :root {
    --bg: #0c0c0e;
    --surface: #13131a;
    --card: #1a1a26;
    --border: #2a2a3d;
    --accent: #f0c060;
    --text: #e8e8f0;
    --muted: #7a7a99;
    --seo: #6c8ebf;
    --email: #e07a5f;
    --social: #7ec8a0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 50px 40px 36px;
    border-bottom: 1px solid var(--border);
  }
  .tag {
    font-family: monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    opacity: 0.8;
  }
  h1 {
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 700;
    line-height: 1.1;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .sub {
    font-family: Arial, sans-serif;
    color: var(--muted);
    font-size: 15px;
    max-width: 500px;
    font-weight: 300;
  }
  .stats {
    display: flex;
    gap: 32px;
    margin-top: 28px;
    flex-wrap: wrap;
  }
  .stats > div {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-num {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    display: block;
    line-height: 1;
  }
  .stat-label {
    font-family: Arial, sans-serif;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    display: block;
  }
  .controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 40px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap { position: relative; flex: 1; min-width: 180px; }
  .search-wrap svg {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    width: 15px; height: 15px;
    stroke: var(--muted); fill: none;
    stroke-width: 2; stroke-linecap: round;
  }
  input[type="search"] {
    width: 100%;
    padding: 9px 14px 9px 36px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: Arial, sans-serif;
    font-size: 14px;
    outline: none;
  }
  input[type="search"]:focus { border-color: var(--accent); }
  input[type="search"]::placeholder { color: var(--muted); }
  .fbtn {
    padding: 9px 16px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: Arial, sans-serif;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .fbtn.active, .fbtn:hover { border-color: var(--accent); color: var(--accent); background: rgba(240,192,96,0.07); }
  .fbtn[data-cat="seo"].active { border-color: var(--seo); color: var(--seo); background: rgba(108,142,191,0.08); }
  .fbtn[data-cat="email"].active { border-color: var(--email); color: var(--email); background: rgba(224,122,95,0.08); }
  .fbtn[data-cat="social"].active { border-color: var(--social); color: var(--social); background: rgba(126,200,160,0.08); }
  main { padding: 28px 40px 60px; max-width: 1400px; margin: 0 auto; }
  .sec-header {
    display: flex; align-items: center; gap: 14px;
    margin: 36px 0 18px;
  }
  .sec-header:first-child { margin-top: 0; }
  .sec-title { font-size: 20px; font-weight: 700; }
  .sec-line { flex: 1; height: 1px; background: var(--border); }
  .sec-count { font-family: monospace; font-size: 11px; color: var(--muted); }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 10px 10px 0 0;
  }
  .card[data-cat="seo"]::before { background: var(--seo); }
  .card[data-cat="email"]::before { background: var(--email); }
  .card[data-cat="social"]::before { background: var(--social); }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.4); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .card-title { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.4; }
  .badge {
    font-family: monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  [data-cat="seo"] .badge { background: rgba(108,142,191,0.15); color: var(--seo); }
  [data-cat="email"] .badge { background: rgba(224,122,95,0.15); color: var(--email); }
  [data-cat="social"] .badge { background: rgba(126,200,160,0.15); color: var(--social); }
  .prompt-box {
    font-family: monospace;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    background: rgba(0,0,0,0.3);
    border-radius: 6px;
    padding: 11px 12px;
    flex: 1;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .prompt-box .var { color: var(--accent); }
  .card-footer { display: flex; justify-content: space-between; align-items: center; }
  .use-case { font-family: Arial, sans-serif; font-size: 11px; color: var(--muted); font-style: italic; }
  .copy-btn {
    padding: 5px 12px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: Arial, sans-serif;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--social); color: var(--social); }
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 50px;
    color: var(--muted);
    font-family: Arial, sans-serif;
  }
  footer {
    padding: 24px 40px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    color: var(--muted);
    font-family: Arial, sans-serif;
    font-size: 12px;
  }
  .tip {
    font-family: monospace;
    font-size: 11px;
    background: var(--card);
    padding: 6px 12px;
    border-radius: 5px;
    border: 1px solid var(--border);
    color: var(--accent);
  }
  @media (max-width: 600px) {
    header, .controls, main, footer { padding-left: 16px; padding-right: 16px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="tag">&#10022; The Prompt Lab 1</div>
  <h1>Marketing Agency<br>AI Prompt Arsenal</h1>
  <p class="sub">55 battle-tested AI prompts for SEO, email marketing, and social media. Copy, customize, deploy.</p>
  <div class="stats">
    <div><span class="stat-num">55</span><span class="stat-label">Prompts</span></div>
    <div><span class="stat-num">3</span><span class="stat-label">Categories</span></div>
    <div><span class="stat-num">&#8734;</span><span class="stat-label">Use Cases</span></div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" id="searchInput" placeholder="Search prompts..." oninput="render()">
  </div>
  <button class="fbtn active" data-cat="all" onclick="setFilter('all')">All</button>
  <button class="fbtn" data-cat="seo" onclick="setFilter('seo')"><span class="dot" style="background:var(--seo)"></span>SEO &amp; Content</button>
  <button class="fbtn" data-cat="email" onclick="setFilter('email')"><span class="dot" style="background:var(--email)"></span>Email Marketing</button>
  <button class="fbtn" data-cat="social" onclick="setFilter('social')"><span class="dot" style="background:var(--social)"></span>Social Media</button>
</div>

<main id="main"></main>

<footer>
  <span>The Prompt Lab 1 &copy; 2025</span>
  <span class="tip">Replace <span style="color:var(--accent)">[bracketed text]</span> with your client details</span>
</footer>

<script>
var prompts = [
  {cat:"seo",title:"Pillar Page Outline",use:"Content strategy",text:"Create a comprehensive pillar page outline for [topic] targeting [primary keyword]. Include 8-10 H2 sections, suggested internal linking opportunities, and a featured snippet target for each section. Audience: [target audience]."},
  {cat:"seo",title:"Keyword Cluster Map",use:"On-page SEO",text:"Generate a keyword cluster map for the topic [main topic] in the [industry] industry. Group keywords into subtopic clusters, identify search intent (informational/transactional/navigational), and suggest URL structure for each cluster."},
  {cat:"seo",title:"Meta Title & Description",use:"SERP optimization",text:"Write 5 meta title and description pairs for a page about [topic]. Keep titles under 60 characters and descriptions under 155. Include [primary keyword] naturally. Make each variant test a different emotional hook."},
  {cat:"seo",title:"FAQ Schema Content",use:"Rich snippets",text:"Generate 8 FAQ questions and detailed answers for [topic/page]. Format for FAQ schema markup. Each answer should be 40-60 words, directly answer the question, and naturally include semantic keywords related to [primary keyword]."},
  {cat:"seo",title:"Competitor Gap Analysis",use:"Content strategy",text:"Analyze the content gap between [our brand/URL] and [competitor URL] for the keyword [keyword]. Identify topics they rank for that we don't, suggest 5 content pieces to close the gap, and prioritize by estimated traffic opportunity."},
  {cat:"seo",title:"Long-Form Blog Post",use:"Organic traffic",text:"Write a 1,500-word SEO blog post targeting [primary keyword] for [brand name] in the [industry] niche. Include: compelling H1, 4-6 H2s with H3 subpoints, 2 internal link suggestions, 1 CTA, and a summary section. Tone: [tone]."},
  {cat:"seo",title:"Product Page Copy",use:"E-commerce SEO",text:"Write SEO-optimized product page copy for [product name] by [brand]. Include: keyword-rich title, 150-word description weaving in [primary keyword] and [secondary keyword], 5 benefit-driven bullet points, and an FAQ section with 3 questions."},
  {cat:"seo",title:"Internal Linking Strategy",use:"Site architecture",text:"Suggest an internal linking strategy for a new blog post about [new post topic] on [website]. Identify 6-8 existing pages that should link to it, suggest anchor text for each, and recommend 3 pages this new post should link out to."},
  {cat:"seo",title:"Title Tag A/B Variants",use:"CTR optimization",text:"Write 6 A/B test variants for the title tag of a page targeting [keyword]. Vary the approaches: question format, number-led, power word, how-to, year-based, and benefit-led. All under 60 characters."},
  {cat:"seo",title:"Content Refresh Brief",use:"Existing content",text:"Audit the following content excerpt and provide a refresh brief: [paste content]. Identify: outdated stats, missing subtopics, opportunities to target [new keyword], recommended additions, and a suggested new H1. Keep what's working."},
  {cat:"seo",title:"Local SEO Page",use:"Local search",text:"Write a local SEO landing page for [business type] in [city, state]. Include: geo-targeted H1, service description with local modifiers, 3 trust signals, a FAQ section with location-specific questions, and a CTA to [desired action]."},
  {cat:"seo",title:"Topic Authority Plan",use:"Content planning",text:"Build a 3-month content plan to establish topical authority in [niche] for [brand]. Suggest 12 blog posts grouped into topic clusters, specify the target keyword for each, indicate funnel stage (TOFU/MOFU/BOFU), and recommend publishing order."},
  {cat:"seo",title:"Schema Markup Brief",use:"Technical SEO",text:"Identify the best schema markup types to implement for a [page type] for [brand] in [industry]. Explain what to include in each schema type and what SERP features it could unlock."},
  {cat:"seo",title:"Guest Post Pitch Angles",use:"Link building",text:"Generate 5 guest post pitch angles for [brand] to earn backlinks in the [industry] niche. Each pitch should include: target publication type, working headline, a 3-sentence article summary, and the unique data or insight we'd provide."},
  {cat:"seo",title:"Semantic SEO Expansion",use:"NLP optimization",text:"Given the primary keyword [keyword], list 20 semantically related terms, entities, and LSI keywords to include in a comprehensive article. Group them by relevance and indicate whether each targets the same or supporting search intent."},
  {cat:"seo",title:"Voice Search Optimization",use:"Featured snippets",text:"Rewrite the following content section to optimize for voice search and position-zero snippets: [paste content]. Use conversational language, answer the implied question within the first 40 words, and format as a concise paragraph followed by a numbered list."},
  {cat:"seo",title:"Content Brief Template",use:"Briefing writers",text:"Create a detailed SEO content brief for a writer covering [topic]. Include: target keyword, secondary keywords, recommended word count, content goal, audience persona, outline with H2s and H3s, tone guidelines, competitor articles to beat, and internal link targets."},
  {cat:"seo",title:"YouTube SEO Description",use:"Video optimization",text:"Write a YouTube video description for a video about [topic] for [channel name]. Include: a keyword-rich first 150 characters, 3-4 paragraph body with [primary keyword] and [secondary keyword], timestamps placeholders, links section, and hashtags."},
  {cat:"email",title:"Welcome Email Sequence",use:"Onboarding",text:"Write a 4-email welcome sequence for [brand], a [type of business]. Email 1: warm welcome + deliver [lead magnet]. Email 2: brand story. Email 3: social proof + best content. Email 4: soft pitch for [product/service]. Tone: [tone]. Each email max 200 words."},
  {cat:"email",title:"Cold Outreach Email",use:"B2B prospecting",text:"Write a cold outreach email from [our company] to [prospect company type]. We help [ICP] achieve [outcome] without [pain point]. Include a personalization line, 2-sentence value prop, social proof, and a low-friction CTA. Under 120 words. No buzzwords."},
  {cat:"email",title:"Abandoned Cart Recovery",use:"E-commerce recovery",text:"Write a 3-email abandoned cart sequence for [product/store name]. Email 1 (1 hr): gentle reminder. Email 2 (24 hrs): address objections + social proof. Email 3 (72 hrs): urgency + offer [discount/bonus]. Each under 150 words. Subject lines included."},
  {cat:"email",title:"Newsletter Issue",use:"Audience engagement",text:"Write a weekly newsletter issue for [brand] audience of [audience description]. Include: punchy subject line, personal opening hook, 3 curated insights with 2-sentence commentary each, one featured tip, and a brief CTA. Total: ~500 words. Tone: [tone]."},
  {cat:"email",title:"Re-engagement Campaign",use:"Win-back",text:"Write a 3-email win-back sequence for subscribers inactive for 90+ days for [brand]. Email 1: we miss you + value reminder. Email 2: show what they've missed. Email 3: final stay or go with an incentive of [offer]. Subject lines included."},
  {cat:"email",title:"Product Launch Sequence",use:"Launch campaigns",text:"Write a 5-email launch sequence for [product name] by [brand]. Include: teaser, announcement, key benefits deep-dive, testimonials + FAQ, and last-chance close. Specify send timing for each. Sales close date: [date]. Price: [price]."},
  {cat:"email",title:"Subject Line Generator",use:"Open rate testing",text:"Generate 10 email subject lines for an email about [email topic] going to [audience]. Create 2 each of: curiosity gap, number-led, personalization, urgency/scarcity, and benefit-driven. Max 50 characters each. Preview text suggestions for the top 3."},
  {cat:"email",title:"Post-Purchase Follow-Up",use:"Retention & upsell",text:"Write a post-purchase email sequence (3 emails) for [product] customers of [brand]. Email 1: thank you + delivery info. Email 2: usage tips to ensure success. Email 3: review request + cross-sell [related product]. Tone: warm and helpful."},
  {cat:"email",title:"Event Invitation Email",use:"Events & webinars",text:"Write an invitation email for [event name], a [webinar/workshop/event] hosted by [brand] on [date]. Include: compelling headline, 3 reasons to attend, speaker credibility, agenda highlights, and a single CTA button. Create urgency with [limited spots/early bird]."},
  {cat:"email",title:"Segmentation Personalization",use:"Advanced targeting",text:"Write the same promotional email for [product] in 3 segmented versions for: (1) new subscribers, (2) past customers, (3) VIP customers. Keep the offer the same but vary the opening hook, social proof, and CTA language for each segment."},
  {cat:"email",title:"Pain-Point Nurture Email",use:"Mid-funnel nurture",text:"Write a nurture email addressing the pain point of [pain point] for [audience]. Start with an empathy hook, share a short story or stat about the problem, introduce [solution/approach] as the bridge, and end with a soft CTA to [content/call/demo]."},
  {cat:"email",title:"Referral Program Email",use:"Growth & referrals",text:"Write an email announcing a referral program for [brand]. Explain: the reward for referring ([reward]), how it works in 3 simple steps, reward for the referee, and make it feel exclusive. Include a shareable referral link CTA. Tone: excited and generous."},
  {cat:"email",title:"Case Study Promo Email",use:"Social proof",text:"Write a promotional email featuring a case study for [brand]. Customer: [customer name/type]. Result: [key result]. Structure: hook with the result upfront, backstory, solution used, 3 key outcomes with data, and CTA to read full case study or book a call."},
  {cat:"email",title:"Seasonal Campaign Email",use:"Seasonal marketing",text:"Write a seasonal marketing email for [brand] tied to [season/holiday]. Include a relevant hook connecting [brand/product] to the season, a limited-time offer of [offer], 3 product highlights, urgency (offer ends [date]), and a clear CTA."},
  {cat:"email",title:"Survey & Feedback Request",use:"Customer insights",text:"Write an email asking [brand] customers to complete a [X-minute] survey. Explain why their feedback matters, what we'll do with results, offer [incentive if any], make the CTA frictionless, and keep the whole email under 150 words."},
  {cat:"email",title:"Milestone Celebration Email",use:"Customer retention",text:"Write a customer milestone celebration email for [brand]. Milestone: [e.g. 1-year anniversary / 10th order]. Personalize with [Name], celebrate the milestone warmly, share a stat about their journey, and surprise them with [gift/offer]."},
  {cat:"email",title:"Thought Leadership Email",use:"B2B authority",text:"Write a thought leadership email from [CEO/founder name] at [brand] sharing an opinion on [industry trend/topic]. Make it conversational and bold. 300 words max. End with one question to spark replies. No hard sell."},
  {cat:"email",title:"Objection Handler Email",use:"Sales nurture",text:"Write an email that addresses the objection '[specific objection, e.g. too expensive]' for [brand] product/service. Acknowledge the concern, reframe it, provide a relevant proof point or guarantee, and offer a low-risk next step."},
  {cat:"social",title:"LinkedIn Thought Leadership",use:"B2B authority",text:"Write a LinkedIn post for [name/brand] sharing a contrarian take on [industry topic]. Start with a bold 1-line hook (no 'I'), follow with 5-7 lines of insight using short punchy paragraphs, end with a thought-provoking question. No hashtag spam. ~200 words."},
  {cat:"social",title:"Instagram Caption Pack",use:"Feed content",text:"Write 5 Instagram captions for [brand] posting about [topic/product]. Vary the styles: storytelling, educational, behind-the-scenes, social proof, and playful/relatable. Each 100-150 words. Include a CTA and 2-3 niche hashtag suggestions per caption."},
  {cat:"social",title:"Twitter/X Thread",use:"Viral content",text:"Write a Twitter/X thread for [brand/person] on the topic: [topic]. Tweet 1: hook that stops the scroll. Tweets 2-8: one insight per tweet, each building on the last. Tweet 9: summary. Tweet 10: CTA. Keep each tweet under 280 chars. Number them (1/10)."},
  {cat:"social",title:"Facebook Ad Copy",use:"Paid social",text:"Write Facebook ad copy for [brand] promoting [product/service] to [target audience]. Create 3 variants: (1) pain-led, (2) curiosity-led, (3) transformation-led. Each needs: primary text (125 words max), headline (40 chars), description (25 chars), and CTA choice."},
  {cat:"social",title:"Monthly Content Calendar",use:"Content planning",text:"Create a 30-day social media content calendar for [brand] across [platforms]. Include: post topic, content format (reel/carousel/static/story), caption hook, and content pillar (educational/entertaining/promotional/community). Mix: 40% educational, 30% entertaining, 20% promotional, 10% community."},
  {cat:"social",title:"Reel / TikTok Script",use:"Short-form video",text:"Write a 30-second Reel/TikTok script for [brand] on the topic [topic]. Include: attention-grabbing first 2 seconds, narration/voiceover script, on-screen text overlays, B-roll suggestions, and a CTA in the final 3 seconds."},
  {cat:"social",title:"Brand Story Post",use:"Authenticity content",text:"Write a brand origin story post for [brand name] for [platform]. Include: the before (problem founder faced), the turning point, how [brand] was born, the mission in one sentence, and a call to community. Make it human and specific."},
  {cat:"social",title:"Product Launch Countdown",use:"Launch hype",text:"Create a 5-post social media countdown for the launch of [product] by [brand]. Posts for: 5 days out (teaser), 3 days (sneak peek), 1 day (urgency), launch day (announcement), day after (social proof). Include caption + visual description each."},
  {cat:"social",title:"UGC Campaign Brief",use:"Community content",text:"Write a UGC campaign brief for [brand] to encourage customers to create content about [product/experience]. Include: campaign hashtag idea, what to show/share, an incentive, 3 sample caption prompts to inspire participants, and a repost strategy."},
  {cat:"social",title:"Carousel Post Script",use:"Educational content",text:"Write a 7-slide LinkedIn/Instagram carousel for [brand] on [topic]. Slide 1: bold hook headline. Slides 2-6: one insight per slide with a short explanation (max 25 words per slide). Slide 7: summary + CTA. Include alt text suggestions for accessibility."},
  {cat:"social",title:"Community Response Templates",use:"Engagement & DMs",text:"Write 6 community management response templates for [brand] covering: (1) genuine compliment, (2) product question, (3) complaint/frustration, (4) negative review, (5) partnership inquiry, (6) media/press inquiry. Each should sound human, on-brand, and move the conversation forward."},
  {cat:"social",title:"Influencer Brief",use:"Influencer marketing",text:"Write a creator/influencer brief for [brand] campaign promoting [product/service]. Include: campaign objective, key messages (3), what to show/not show, required disclosures, deliverables (format + quantity), posting window, and creative freedom notes. Tone: collaborative, not corporate."},
  {cat:"social",title:"Stories Content Series",use:"Stories engagement",text:"Plan a 5-day Instagram/Facebook Stories series for [brand] around the theme [theme/launch/event]. For each day include: story type (poll/quiz/countdown/behind-scenes/tutorial), visual concept, text overlay copy, interactive element, and link CTA."},
  {cat:"social",title:"Social Proof Highlights",use:"Trust building",text:"Write 5 social media posts for [brand] showcasing customer results/testimonials. For each: craft a hook using the customer result, include a brief story, feature a quote from [raw testimonial], and end with a soft CTA. Keep it specific and credible."},
  {cat:"social",title:"Newsjacking Post",use:"Trending moments",text:"Write a social post for [brand] that newsjacks the trending topic [trending topic/event]. Connect it relevantly to [brand niche/product] without being tone-deaf. Keep it timely, clever, and short. Platform: [platform]. Include a suggested visual concept."},
  {cat:"social",title:"Hashtag Strategy",use:"Reach & discovery",text:"Build a hashtag strategy for [brand] in the [industry] niche on [platform]. Recommend: 5 high-volume hashtags (1M+), 5 mid-tier (100k-1M), 5 niche (under 100k), and 2 branded hashtag ideas. Explain the mix rationale and when to rotate sets."},
  {cat:"social",title:"Cross-Platform Repurpose",use:"Content efficiency",text:"Take the following long-form content and repurpose it for 4 platforms: [paste blog post or script]. Create: LinkedIn post, Instagram caption, Twitter/X thread opener (hook + first 3 tweets), and a TikTok/Reel hook + talking points. Preserve the core message, adapt the format."},
  {cat:"social",title:"Competitor Content Audit",use:"Competitive intel",text:"Analyze the social media content strategy of [competitor brand]. Identify: their top content pillars, posting cadence, hook formulas they use, gaps we could exploit, and 3 content ideas they have not done that [our brand] could own."}
];

var catLabels = {seo:"SEO & Content", email:"Email Marketing", social:"Social Media"};
var currentFilter = "all";

function hl(text, q) {
  if (!q) return text;
  var re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&") + ")", "gi");
  return text.replace(re, '<mark style="background:rgba(240,192,96,0.25);border-radius:2px">$1</mark>');
}

function fmtPrompt(text, q) {
  var t = text.replace(/\[([^\]]+)\]/g, '<span class="var">[$1]</span>');
  return q ? hl(t, q) : t;
}

function render() {
  var q = document.getElementById("searchInput").value.toLowerCase().trim();
  var main = document.getElementById("main");
  main.innerHTML = "";
  var cats = currentFilter === "all" ? ["seo","email","social"] : [currentFilter];
  var total = 0;

  cats.forEach(function(cat) {
    var items = prompts.filter(function(p) {
      return p.cat === cat && (!q ||
        p.title.toLowerCase().indexOf(q) > -1 ||
        p.text.toLowerCase().indexOf(q) > -1 ||
        p.use.toLowerCase().indexOf(q) > -1);
    });
    if (!items.length) return;
    total += items.length;

    var sec = document.createElement("div");
    sec.innerHTML = '<div class="sec-header"><h2 class="sec-title" style="color:var(--' + cat + ')">' + catLabels[cat] + '</h2><div class="sec-line"></div><span class="sec-count">' + items.length + ' prompts</span></div>';
    main.appendChild(sec);

    var grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(function(p, i) {
      var card = document.createElement("div");
      card.className = "card";
      card.setAttribute("data-cat", cat);
      var safeText = JSON.stringify(p.text);
      card.innerHTML =
        '<div class="card-top">' +
          '<div class="card-title">' + (q ? hl(p.title, q) : p.title) + '</div>' +
          '<span class="badge">' + catLabels[cat] + '</span>' +
        '</div>' +
        '<div class="prompt-box">' + fmtPrompt(p.text, q) + '</div>' +
        '<div class="card-footer">' +
          '<span class="use-case">&#8627; ' + p.use + '</span>' +
          '<button class="copy-btn" onclick="copyPrompt(this,' + safeText + ')">Copy</button>' +
        '</div>';
      grid.appendChild(card);
    });

    main.appendChild(grid);
  });

  if (total === 0) {
    main.innerHTML = '<div class="empty">No prompts match your search. Try different keywords.</div>';
  }
}

function setFilter(cat) {
  currentFilter = cat;
  document.querySelectorAll(".fbtn").forEach(function(b) {
    b.classList.toggle("active", b.getAttribute("data-cat") === cat);
  });
  render();
}

function copyPrompt(btn, text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() { showCopied(btn); });
  } else {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); } catch(e) {}
    document.body.removeChild(ta);
    showCopied(btn);
  }
}

function showCopied(btn) {
  btn.classList.add("copied");
  btn.textContent = "Copied!";
  setTimeout(function() {
    btn.classList.remove("copied");
    btn.textContent = "Copy";
  }, 2000);
}

render();
</script>
</body>
</html>
